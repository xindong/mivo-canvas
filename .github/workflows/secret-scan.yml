# Secret scan — gitleaks via docker (ghcr.io/gitleaks/gitleaks).
# 独立 workflow,不依赖 ci.yml(PR #21 未合时也能在 main 上独立生效)。
# 用户授权直推 main(仅本任务,下不为例;其他任务仍走 draft PR)。
#
# 扫描语义:
# - pull_request:扫 PR commit 范围(base..head)
# - push main:扫全量历史(--all)
#
# .gitleaks.toml:[extend] useDefault=true(gitleaks 默认规则,覆盖 github-token /
# aws-access-key / slack-token / 通用 API key 等真实 key 形态)+ [allowlist] 豁免
# 占位/fixture(<redacted> / test-token / e2e-token / .env.example)。
# 真实 key 形态绝不豁免。job 失败即 CI 红。

name: secret-scan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 取全历史 —— gitleaks 扫提交历史,且 PR commit range 需 base SHA 可达
      - name: Checkout (full history for gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks via docker:lead 口径「action 有坑则退 docker」。
      # 坑:gitleaks-action@v2 基于 Node 20,在 Node 24 runner 上 ScanPullRequest 抛异常。
      # docker 用官方 ghcr.io image,行为与本地 gitleaks CLI 一致。
      - name: gitleaks detect
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            LOG_OPTS="--all"
          fi
          echo "gitleaks log-opts: $LOG_OPTS"
          docker run --rm -v "$PWD":/src ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source /src --config /src/.gitleaks.toml --log-opts "$LOG_OPTS" --no-banner --redact=100
