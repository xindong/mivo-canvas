# MivoCanvas CI — P1-f phase 1
#
# 基础半程: lint + tsc + 单元测试 + 日志规则守卫 + 结构守卫(防回潮)。
# 对应 productization-roadmap.md §6.2 P1-f 与 §13 SC5.2。
#
# 后续 P1-f phase2(占位,尚未实现):
#   - e2e(mock 上游 generation 链路)job —— 不打真链路,用 mock BFF/image 服务验证 UI 流程
#   - MIVO_BFF_TOKEN gated 矩阵 —— 需要真链路的 job 在此 secret 可用时才跑,默认跳过
#   - nightly 真链路 —— 每日定时跑真实 generation 链路,失败只告警不阻断
# 见 productization-roadmap.md §6.2 P1-f phase2 与 §13 SC5.2 后半程。

name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支/PR 的新推送取消旧运行,省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: lint + tsc + unit + logging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc -b)
        run: npx tsc -b

      - name: Lint (eslint)
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Verify logging rules
        run: npm run verify:logging

  structure-guard:
    name: structure guard (anti-regression)
    runs-on: ubuntu-latest
    steps:
      # v2 增量语义需要 merge-base(HEAD, base) 可达,故全量 fetch。
      # MIVO_GUARD_BASE_SHA 注入 PR base SHA;push 事件(无 PR context)时为空,
      # 守卫回退用 git merge-base HEAD origin/main。
      - name: Checkout (full history for merge-base)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # 守卫脚本是纯 node(无第三方依赖),无需 npm ci
      - name: Run structure guard
        env:
          MIVO_GUARD_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/ci/structure-guard.mjs

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 取全历史 —— gitleaks 扫提交历史,且 PR commit range 需 base SHA 可达
      - name: Checkout (full history for gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks via docker(lead 口径:action 有坑则退 docker)。
      # 坑:gitleaks-action@v2 基于 Node 20,在 Node 24 runner 上 ScanPullRequest 抛异常
      # (run 28675083469)。docker 用官方 image,行为与本地 gitleaks CLI 一致。
      # .gitleaks.toml:[extend] useDefault=true 叠加默认规则(sk-/ghp_/AKIA 等)
      # + [allowlist] 豁免占位/fixture(<redacted>/test-token/e2e-token/.env.example)。
      # 真实 key 形态绝不豁免。job 失败即 CI 红,与其他 job 同级卡口。
      # PR:扫 PR commit 范围(base..head);push main:扫全量历史(--all)。
      - name: gitleaks detect
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            LOG_OPTS="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            LOG_OPTS="--all"
          fi
          echo "gitleaks log-opts: $LOG_OPTS"
          docker run --rm -v "$PWD":/src ghcr.io/gitleaks/gitleaks:latest \
            detect --source /src --config /src/.gitleaks.toml --log-opts "$LOG_OPTS" --no-banner --redact=100
