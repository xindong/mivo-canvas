# MivoCanvas CI — P1-f phase 1
#
# 基础半程: lint + tsc + 单元测试 + 日志规则守卫 + 结构守卫(防回潮)。
# 对应 productization-roadmap.md §6.2 P1-f 与 §13 SC5.2。
#
# 后续 P1-f phase2(占位,尚未实现):
#   - e2e(mock 上游 generation 链路)job —— 不打真链路,用 mock BFF/image 服务验证 UI 流程
#   - MIVO_BFF_TOKEN gated 矩阵 —— 需要真链路的 job 在此 secret 可用时才跑,默认跳过
#   - nightly 真链路 —— 每日定时跑真实 generation 链路,失败只告警不阻断
# 见 productization-roadmap.md §6.2 P1-f phase2 与 §13 SC5.2 后半程。

name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支/PR 的新推送取消旧运行,省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: lint + tsc + unit + logging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc -b)
        run: npx tsc -b

      - name: Lint (eslint)
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Verify logging rules
        run: npm run verify:logging

  structure-guard:
    name: structure guard (anti-regression)
    runs-on: ubuntu-latest
    steps:
      # v2 增量语义需要 merge-base(HEAD, base) 可达,故全量 fetch。
      # MIVO_GUARD_BASE_SHA 注入 PR base SHA;push 事件(无 PR context)时为空,
      # 守卫回退用 git merge-base HEAD origin/main。
      - name: Checkout (full history for merge-base)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # 守卫脚本是纯 node(无第三方依赖),无需 npm ci
      - name: Run structure guard
        env:
          MIVO_GUARD_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/ci/structure-guard.mjs

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 取全历史 —— gitleaks 扫提交历史,不只扫工作区。
      # PR 事件:gitleaks-action 自动扫 PR commit 范围(相对 base)。
      # push main:扫 push 的 commit 范围(全量历史由 nightly/定期深度扫描覆盖,本 job 卡增量)。
      - name: Checkout (full history for gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks-action@v2:kirozeng 是个人账号,无需 GITLEAKS_LICENSE。
      # .gitleaks.toml 用 [extend] useDefault=true 叠加默认规则(sk-/ghp_/AKIA 等),
      # + [allowlist] 豁免占位/fixture(<redacted>/test-token/e2e-token/.env.example)。
      # 真实 key 形态绝不豁免。job 失败即 CI 红,与其他 job 同级卡口。
      # 注:v2 基于 Node 20,2026-09-16 后 deprecation;届时升 gitleaks-action@v3(Node 24)。
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # 不在 PR 上发评论(避免噪音);job summary 仍显示发现;不上传 sarif artifact(省额度)
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"
