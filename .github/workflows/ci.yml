# MivoCanvas CI — P1-f phase 2
#
# PR 基线: lint + tsc + 单元测试 + 日志规则守卫 + 结构守卫(防回潮)
# + prod 真拓扑 e2e(mock upstream) + e2e token gate matrix(authorized/unauthorized,
# SSO 新模型语义,job 名固定以匹配 main 分支保护 required checks)。
# 对应 productization-roadmap.md §6.2 P1-f 与 §13 SC5.2。
#
# secret-scan 已移至独立 workflow .github/workflows/secret-scan.yml(直推 main,
# 对所有 PR 立即生效,不等本 PR 合并)。本 ci.yml 不再含 secret-scan job,
# .gitleaks.toml 也由 main 上的独立 workflow 持有(避免合并撞车)。
#
# nightly 全量 prod e2e 与真上游占位链路见独立 workflow:
# .github/workflows/nightly-e2e.yml
#
# bench job（非阻断）见下方 `bench`：微基准 *.bench.test.ts 移出 required gate，
# 单列 job 只报告不阻断合并——毫秒级阈值在共享 runner flake，沿革见 issue #172。

name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一分支/PR 的新推送取消旧运行,省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: lint + tsc + unit + logging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc -b)
        run: npx tsc -b

      - name: Lint (eslint)
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm run test:unit

      - name: Verify logging rules
        run: npm run verify:logging

  # bench job（非阻断）—— issue #172 方向 1：微基准 *.bench.test.ts 移出 required gate
  # （build-and-test 的 test:unit），单列非阻断 job 只报告不阻断。毫秒级阈值在共享 runner
  # 上 flake 会挡住与被测 PR 无关的合并队列；性能回归监控与功能正确性闸门不同生死线。
  # step continue-on-error=true + outcome 读取：无论成败都把 /tmp/pr-r2-bench-result.json
  # 的关键数字写入 $GITHUB_STEP_SUMMARY，仅在失败时发 ::warning:: 注解（不阻断 PR 合并）。
  bench:
    name: bench (perf report, non-blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      # continue-on-error：bench 失败不阻断本 job（job 仍绿），只发 warning 注解 + summary。
      - name: Run bench micro-tests
        id: bench
        continue-on-error: true
        run: npm run test:bench

      # 无论 bench 成败都汇总关键数字进 summary（diagnostics-first）。结果文件由测试在
      # assert 前写 /tmp/pr-r2-bench-result.json（故即使断言失败也有数据）。两条降级路径
      # 都不令 summary step 翻红（Greptile #173 P2）：文件不存在 → else 分支提示；文件存在
      # 但字段缺失/损坏 → node -e try/catch + Number.isFinite 降级输出解析错误。
      - name: Surface bench numbers in job summary
        if: always()
        run: |
          {
            echo '## bench 微基准报告 (leaferPaintSignature, non-blocking)'
            echo ''
            if [ -f /tmp/pr-r2-bench-result.json ]; then
              node -e "try { const fs=require('fs'); const r=JSON.parse(fs.readFileSync('/tmp/pr-r2-bench-result.json','utf8')); if(!r||typeof r!=='object') throw new Error('结果非 JSON 对象'); const d=Number(r.dragOneP95Ms); const a=Number(r.allChangedP95Ms); if(!Number.isFinite(d)||!Number.isFinite(a)) throw new Error('dragOneP95Ms/allChangedP95Ms 缺失或非有限数'); const ratio=(a/Math.max(d,0.001)).toFixed(2); console.log('| metric | value |'); console.log('|--------|-------|'); console.log('| dragOneP95Ms | '+d.toFixed(3)+' ms |'); console.log('| allChangedP95Ms | '+a.toFixed(3)+' ms |'); console.log('| ratio (all/drag p95) | '+ratio+'x |'); } catch(e) { console.log('_(bench 结果文件存在但无法解析：'+((e&&e.message)||String(e))+'，见上方 bench step 日志)_'); }"
              echo ''
              echo '> 阈值契约: dragP95 < 8ms 且 dragP95 < allP95（见 leaferPaintSignature.bench.test.ts）；本 job 非阻断，仅报告。'
            else
              echo '_(bench 结果文件未生成：测试可能在 setup 阶段异常，见上方 bench step 日志)_'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Warn on bench breach (non-blocking)
        if: always() && steps.bench.outcome == 'failure'
        run: |
          echo "::warning::微基准 leaferPaintSignature 超阈值或异常（非阻断，仅报告，不挡合并）。详见 job summary 与上方 bench step 日志；沿革见 issue #172。"

  structure-guard:
    name: structure guard (anti-regression)
    runs-on: ubuntu-latest
    steps:
      # v2 增量语义需要 merge-base(HEAD, base) 可达,故全量 fetch。
      # MIVO_GUARD_BASE_SHA 注入 PR base SHA;push 事件(无 PR context)时为空,
      # 守卫回退用 git merge-base HEAD origin/main。
      - name: Checkout (full history for merge-base)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # 守卫脚本是纯 node(无第三方依赖),无需 npm ci
      - name: Run structure guard
        env:
          MIVO_GUARD_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/ci/structure-guard.mjs

  e2e-prod-subset:
    # 迁移 gate:T0.7 —— PR e2e 必须在 dom + leafer 双渲染器下都通过,堵死"legacy/dom
    # 绿灯下混进 main"的漏洞(leafer 自 2026-07-06 起为默认渲染器,见 CLAUDE.md)。
    # --renderer=both 透传给 e2e-runner(npm run ... -- --renderer=both),runner 依次跑
    # dom / leafer 两个阶段;canvas-interactions 在 leafer 阶段被显式 skip(已知引擎
    # 限制:该场景是 DOM 结构契约,见下方 skip 清单步骤,非静默)。
    # T0.7 已落地:e2e-runner 支持 --kernel=new|legacy|both(透传为页面 ?kernel=)。
    # 本 job 仍跑默认 legacy(--renderer=both);kernel=new 由独立 e2e-kernel-gate job
    # (required)覆盖,两 job 合起来覆盖 (renderer × kernel) 笛卡尔积(contract §7)。
    # T1.2 S1-S6d 已合入 main,kernel=new 路径已接活;e2e-kernel-gate 自 2026-07-10
    # 起翻 required,堵死 kernel=new 回归混进 main。
    name: e2e prod subset (mock upstream)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build

      - name: Run prod subset e2e (dom + leafer)
        run: |
          set -o pipefail
          mkdir -p test-artifacts
          # --renderer=both 经 npm 的 -- 透传到 e2e-runner.mjs 的 parseRenderer。
          # 子集 5 场景 × 2 渲染器;若实际时长逼近 20min 上限,改为 dom/leafer 矩阵并行。
          npm run test:e2e:prod:subset -- --renderer=both 2>&1 | tee test-artifacts/e2e-prod-subset.log

      # leafer 阶段 skip 清单汇总进 job summary —— 不许静默。
      # skip 名单+理由权威源:scripts/e2e/scenarios/index.mjs 的 leaferSkippedScenarios。
      # e2e-smoke.mjs 逐场景打印 [e2e-smoke] SKIP 行,此处从日志提取汇总。
      - name: Surface leafer skip list in job summary
        if: always()
        run: |
          {
            echo '## Leafer e2e skip 清单 (--renderer=both)'
            echo ''
            echo 'dom 阶段全场景必跑;leafer 阶段下列场景被显式 skip(已知引擎限制,非静默)。'
            echo 'e2e-smoke.mjs 逐场景打印 SKIP 行,此处从日志提取汇总进 job summary。'
            echo '权威源:`scripts/e2e/scenarios/index.mjs` 的 `leaferSkippedScenarios`。'
            echo ''
            echo '```'
            grep -E '\[e2e-smoke\] SKIP scenario=' test-artifacts/e2e-prod-subset.log 2>/dev/null \
              || echo '(本运行无 leafer skip —— dom-only 或 leafer 下全场景跑通)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload failing e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-prod-subset-artifacts
          path: test-artifacts
          if-no-files-found: warn
          retention-days: 14

  # 迁移 gate:T0.7 —— kernel gate job。跑 prod subset 在 --kernel=new 下
  # (× --renderer=both → dom+new / leafer+new)。与 e2e-prod-subset(默认 legacy +
  # --renderer=both)互补,两 job 合起来覆盖 (renderer × kernel) 笛卡尔积(contract §7)。
  # 观察窗已结束(自 #186 起多 PR 全绿),2026-07-10 翻 required,T1.2 S1-S6d 已合入 main。
  # 失败即阻断(job 正常红);lead 把本 check 加进 main 分支保护 required checks。
  e2e-kernel-gate:
    name: e2e kernel gate (new)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build

      # 阻断:kernel gate 失败即令本 step 红 → job 红 → 挡 PR 合并(required check)。
      - name: Run prod subset e2e (kernel=new)
        run: |
          set -o pipefail
          mkdir -p test-artifacts
          npm run test:e2e:prod:subset -- --renderer=both --kernel=new 2>&1 | tee test-artifacts/e2e-kernel-gate.log

      - name: Surface kernel-gate result in job summary
        if: always()
        run: |
          {
            echo '## e2e kernel gate (--kernel=new, required)'
            echo ''
            echo '阻断:prod subset 在 kernel=new 下(dom+leafer)跑通即绿,失败即挡 PR 合并。'
            echo '观察窗已于 2026-07-10 结束并翻 required(T1.2 S1-S6d 已合入 main)。与 e2e-prod-subset(legacy)互补覆盖 (renderer×kernel) 笛卡尔积。'
            echo ''
            echo '```'
            tail -n 20 test-artifacts/e2e-kernel-gate.log 2>/dev/null || echo '(无日志:可能在 setup 阶段异常,见上方 step 日志)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload failing e2e artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-kernel-gate-artifacts
          path: test-artifacts
          if-no-files-found: warn
          retention-days: 14

  # 迁移 gate:T0.7 —— visual-diff job。DOM baseline vs Leafer candidate 像素对照,
  # diff% 超阈值(DIFF_THRESHOLD_PERCENT,默认 5%)即 fail,挡住 leafer 渲染回归混进 main。
  # 用现有 scripts/visual-diff.mjs harness(自起 vite dev server,无需 prod build)。
  # T0.7 已落地:e2e-runner 支持 --kernel= 透传。visual-diff 暂未接 --kernel(当前
  # 只对照 renderer 维度);kernel=new 路径接活后,可扩为按 --kernel 矩阵分别采集
  # DOM/Leafer baseline 对照 —— 留待 kernel=new 有可视差异时再做,本 PR 不扩。
  visual-diff:
    name: visual diff (dom vs leafer)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # 三个 fixture 是 visual-diff.mjs 显式支持 dom-vs-leafer 对照的(头部 docstring 列出):
      # rotation(FU-8 旋转)/ brush-stamp(Phase 4c 笔迹+贴纸)/ markup-text(FU-11 文字层)。
      # text fixture 不在此列:文本节点"永久留 DOM"(Phase 5 判决),leafer 模式下无 leafer
      # 绘制子节点 → harness 的 expected>0 等待会超时,非回归,故不纳入 gate。
      - name: Run visual diff (dom baseline vs leafer candidate)
        run: |
          set -o pipefail
          mkdir -p test-artifacts/visual-diff
          # 累积失败:任一 fixture diff% 超阈值(脚本 exit 1)即令本 step 失败,
          # 但仍跑完全部 fixture 以便 job summary 汇总所有结果(诊断优先于 fail-fast)。
          fail=0
          for fixture in rotation brush-stamp markup-text; do
            echo "::group::visual-diff fixture=$fixture"
            node scripts/visual-diff.mjs --baseline=dom --candidate=leafer --fixture="$fixture" --output=test-artifacts/visual-diff || fail=1
            echo "::endgroup::"
          done
          exit "$fail"

      - name: Surface visual-diff report in job summary
        if: always()
        run: |
          {
            echo '## visual-diff 报告 (dom baseline vs leafer candidate)'
            echo ''
            echo '| fixture | diff% | threshold | result |'
            echo '|---------|-------|-----------|--------|'
            for f in test-artifacts/visual-diff/diff-report*.json; do
              [ -e "$f" ] || continue
              node -e "const r=require('./$f'); console.log('| '+(r.fixture||'-')+' | '+r.diff.diffPercent+'% | '+r.diff.thresholdPercent+'% | '+(r.diff.passed?'PASS':'FAIL')+' |')"
            done
            echo ''
            echo '> 阈值权威源:scripts/visual-diff.mjs DIFF_THRESHOLD_PERCENT(默认 5%)。'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload visual-diff artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-artifacts
          path: test-artifacts/visual-diff
          if-no-files-found: warn
          retention-days: 14

  e2e-token-gated:
    name: e2e token gate (${{ matrix.mode }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        # mode 名必须保持 authorized/unauthorized —— main 分支保护的 required status
        # checks 写死为 `e2e token gate (authorized)` / `e2e token gate (unauthorized)`
        # (enforce_admins=true),改名会让这两个必需 check 永不上报,PR 合不了。
        # 逻辑用 SSO 新模型(非旧 app-gate/BFF-token),mode 名映射:
        #   unauthorized → MIVO_PUBLIC=1(dev 桩关)→ /api/auth/me 401(SSO 下"未登录")
        #   authorized   → dev 桩开(local)→ /api/auth/me 200 + 网关契约 shape
        mode:
          - authorized
          - unauthorized
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      # SSO 模型下 HTTP-可验安全属性(纯 fetch,无需 Playwright / 构建产物)。
      - name: Run gated check
        run: |
          set -o pipefail
          mkdir -p test-artifacts
          node scripts/e2e-gated-check.mjs --mode=${{ matrix.mode }} 2>&1 | tee test-artifacts/e2e-token-gated-${{ matrix.mode }}.log

      - name: Upload failing gated artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-token-gated-${{ matrix.mode }}-artifacts
          path: test-artifacts
          if-no-files-found: warn
          retention-days: 14

  # T1.3 PG backend CI 闸门(#202 复审遗留增强)。
  # PG 后端测试(双后端契约 32 场景 + 并发回归)原在 CI 无 PG 全部 describe.skip。
  # 本 job 起 postgres:16 service container(与生产一致 PG16),跑 MIVO_PG_TEST=1 套件。
  # **先非 required(观察窗)**,稳定后另 PR 翻 required + 注册 main 分支保护必需 check
  # (check 名 `CI / pg suite (PG16)`,仿 #186→#193 e2e-kernel-gate 先例)。
  #
  # 衔接 #202 时序(关键):
  #   - main 当前无 server/persist PG 测试文件(在 #202 分支返修中):backend.contract.dual /
  #     backend.pg / persist.route.dual 三个 PG-gated 文件在 origin/main 上均不存在。
  #   - 故本 PR 里 vitest 跑 0 个 PG 用例(--passWithNoTests → 绿);证明的是 PG infra 可用:
  #     service container 起 + psql 可连 + CREATEDB 可用 + vitest 命令正确。
  #   - #202 合入 main 后,三个文件出现,本 job 自动跑真 PG 用例(契约 32 场景 + 并发回归),
  #     无需改 workflow——观察窗即此生效。
  pg-suite:
    name: pg suite (PG16)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        # PG16(与生产一致)。service container + healthcheck。
        image: postgres:16
        env:
          # 测试专用 superuser + DB;无生产凭据。POSTGRES_USER 创建为 superuser(满足
          # backend.pg.test.ts ensureUnitDb 的 CREATEDB 需求)。密码 = #202 测试默认,非生产。
          POSTGRES_USER: mivo
          POSTGRES_PASSWORD: mivo-test-no-password
          # 初始化即建 mivocanvas DB(contract.dual / route.dual 用;mivocanvas_unit 由测试
          # ensureUnitDb 自建,下方 psql 步预建以加速 + 验证 CREATEDB)。
          POSTGRES_DB: mivocanvas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mivo -d mivocanvas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MIVO_PG_TEST: '1'
      MIVO_PG_HOST: 127.0.0.1
      MIVO_PG_PORT: '5432'
      MIVO_PG_USER: mivo
      MIVO_PG_PASSWORD: mivo-test-no-password
      MIVO_PG_DB: mivocanvas
      MIVO_PG_UNIT_DB: mivocanvas_unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 安装 psql client 跑连通验证(lead 验证铁律:service container 起得来 + psql 可连)。
      # ubuntu-latest 默认无 psql;postgresql-client 任意版本可连 PG16(协议兼容)。
      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      # 显式 psql 连通 + 建库验证:本 PR(main 无 PG 测试文件)里这是 PG infra 的核心证据;
      # #202 合入后该步是 PG 套件的可用性前置(两 DB 均就绪)。
      - name: Verify PG connectivity & DB provisioning
        run: |
          set -e
          echo "::group::pg_isready (service container health)"
          pg_isready -h 127.0.0.1 -p 5432 -U mivo -d mivocanvas
          echo "::endgroup::"
          echo "::group::psql connect as mivo + list DBs (auth proof)"
          PGPASSWORD=mivo-test-no-password psql -h 127.0.0.1 -p 5432 -U mivo -d mivocanvas -c "\l"
          echo "::endgroup::"
          echo "::group::Ensure mivocanvas_unit DB exists (backend.pg.test isolation DB)"
          PGPASSWORD=mivo-test-no-password psql -h 127.0.0.1 -p 5432 -U mivo -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='mivocanvas_unit'" | grep -q 1 \
            || PGPASSWORD=mivo-test-no-password psql -h 127.0.0.1 -p 5432 -U mivo -d postgres -c "CREATE DATABASE mivocanvas_unit"
          echo "mivocanvas_unit ready (CREATEDB confirmed)"
          echo "::endgroup::"

      # 跑 PG-gated 套件。--no-fileParallelism:两 DB 隔离设计下更稳(lead 指定)。
      # --passWithNoTests:main 无 PG 测试文件时 0 匹配不算失败(本 PR 即此态);
      # #202 合入后三个文件出现,实跑真 PG 用例(失败即红;观察窗内非阻断,翻 required 后阻断)。
      - name: Run PG-gated vitest suite
        run: |
          set -o pipefail
          mkdir -p test-artifacts
          npx vitest run --no-fileParallelism --passWithNoTests \
            server/persist/backend.contract.dual.test.ts \
            server/persist/backend.pg.test.ts \
            server/routes/persist.route.dual.test.ts 2>&1 | tee test-artifacts/pg-suite.log

      # 汇总:本轮 0 个 PG 文件(infra-only)还是真跑了 N 个(#202 合入后)。不许静默。
      - name: Surface pg-suite result in job summary
        if: always()
        run: |
          {
            echo '## pg suite (PG16, 非阻断观察窗)'
            echo ''
            echo 'PG 后端测试闸门:postgres:16 service container + `MIVO_PG_TEST=1` vitest 套件。'
            echo '**先非 required**(观察窗),稳定后另 PR 翻 required + 注册 `CI / pg suite (PG16)` 进 main 必需 check(仿 #186→#193 e2e-kernel-gate 先例)。'
            echo ''
            echo '### 衔接 #202 时序'
            echo '- main 当前无 `server/persist` PG 测试文件(在 #202 分支返修中)。'
            echo '- 本 PR 里 job 跑 0 个 PG 用例(`--passWithNoTests` → 绿),证明 PG infra 可用:service container 起 + psql 可连 + CREATEDB 可用 + vitest 命令正确(见上方 psql 步与 vitest 步日志)。'
            echo '- #202 合入 main 后,三个 PG-gated 文件出现,本 job 自动跑真 PG 用例(双后端契约 32 场景 + 并发回归),无需改 workflow。'
            echo ''
            echo '### 本轮 vitest 匹配文件数(不许静默:0 vs N 可见)'
            nFound=0
            for f in server/persist/backend.contract.dual.test.ts server/persist/backend.pg.test.ts server/routes/persist.route.dual.test.ts; do
              if [ -f "$f" ]; then echo "- \`$f\` ✅ 存在"; nFound=$((nFound+1)); else echo "- \`$f\` ⏳ main 上尚不存在(#202 合入后出现)"; fi
            done
            echo ''
            if [ "$nFound" -eq 0 ]; then
              echo '> **infra-only 模式**:0 个 PG 测试文件 → vitest `--passWithNoTests` 空跑绿。PG infra 由上方 psql 连通步验证。#202 合入后自动切真跑。'
            else
              echo "> **真 PG 测试模式**:$nFound 个文件匹配,vitest 实跑(见下方日志)。"
            fi
            echo ''
            echo '### vitest 日志(末 30 行)'
            echo '```'
            tail -n 30 test-artifacts/pg-suite.log 2>/dev/null || echo '(无日志:可能在 setup 阶段异常,见上方 step 日志)'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pg-suite artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: pg-suite-artifacts
          path: test-artifacts
          if-no-files-found: warn
          retention-days: 14
