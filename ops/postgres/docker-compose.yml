# ops/postgres/docker-compose.yml
# MivoCanvas P1 后端底座 PG(provisioning)。lead/owner 确认后才在服务器实操(见
# docs/runbook/t1.1-pg-provisioning.md)。严禁本地 docker compose up,只做 config 校验。
#
# 要点:PG 16-alpine;数据卷 bind /AIGC_Group/mivo-canvas-data/pg;仅绑 127.0.0.1:宿主端口走
# MIVO_PG_HOST_PORT(默认 5432,共享机端口冲突时改;容器内恒 5432,healthcheck 不变);
# 密码走 .env(.env.example 是模板,真实 .env 不入库);healthcheck + restart
# policy + 资源限制 + 日志轮转。
# 网络:显式声明 default 网络 + 固定 ipam 网段(192.168.228.0/24,network name 固定
# mivo-pg-net)。compose 默认会自动建 <project>_default 网络并从 docker 池随机选段
# (典型 172.16-31/16),可抢占企业内网 → 2026-07-11 事故:postgres_default 抢占
# 172.26.0.0/16 与公司边缘网关冲突 → 已登录用户 502 近 11h(见 runbook §9)。固定
# ipam 后 compose down/up 网络名/网段均不变,杜绝自动选段冲突;选段依据见 runbook §0.2。
# 语法校验:docker compose --env-file ops/postgres/.env.example -f ops/postgres/docker-compose.yml config
#
# 认证:不设 POSTGRES_HOST_AUTH_METHOD → 用镜像默认(local socket=trust,docker exec 脚本
# 免密;TCP=scram-sha-256,BFF 走 127.0.0.1 带密码)。仅绑 127.0.0.1 + 服务器受控访问,
# local trust 可接受;若需更严,设 POSTGRES_HOST_AUTH_METHOD=scram-sha-256 并给 backup/
# restore 脚本加 PGPASSWORD(见 runbook §认证取舍)。

services:
  mivo-postgres:
    image: postgres:16-alpine
    container_name: mivo-postgres
    restart: unless-stopped
    # 仅绑 127.0.0.1:不对外,只能本机/BFF 访问(生产如需远程走 ssh tunnel 或网关,不在本文件)。
    # 宿主端口走 MIVO_PG_HOST_PORT(默认 5432;共享机 5432 被占时改 .env,容器内恒 5432)。
    ports:
      - "127.0.0.1:${MIVO_PG_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mivo}
      # :? 强制 .env 必填(空/缺即拒起),避免裸密码入库。
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required — set in ops/postgres/.env}
      POSTGRES_DB: ${POSTGRES_DB:-mivocanvas}
      # 容器内时区与服务器对齐(备份时间戳/日志可读)。
      TZ: Asia/Shanghai
    # 数据卷:bind 主机 /AIGC_Group/mivo-canvas-data/pg → 容器 PGDATA(默认 /var/lib/postgresql/data)。
    # 首次 up 前须确保该目录存在且为空(否则 PG 初始化可能拒跑,见 runbook 前置检查)。
    volumes:
      - /AIGC_Group/mivo-canvas-data/pg:/var/lib/postgresql/data
    # 共享内存(PG 并行查询/临时表用,默认 64m 偏小)。
    shm_size: 256m
    # 资源限制(Compose V2 的 docker compose up 落实 deploy.resources.limits)。
    # 可按服务器实际调;runbook §需 owner 确认 里提示若服务器规格不同则改。
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mivo} -d ${POSTGRES_DB:-mivocanvas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # 日志轮转(防 pg 日志撑爆磁盘)。
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ── 网络(固定 ipam,防自动选段抢占企业内网;见文件头注释 + runbook §0.2/§9)──
# 选段依据(192.168.228.0/24):
#   * 避开 172.16.0.0/12(172.16-31.x):公司在用 172.26.x(边缘网关 172.26.164.81),
#     docker 默认用户桥池也从该 /12 分配(postgres_default 正是抢到 172.26.0.0/16);
#   * 避开 10.0.0.0/8:服务器网段 10.102.x(见 runbook §0.1 共享机 10.102.80.15);
#   * 避开 172.17.0.0/16:docker0 默认桥;
#   * 选 192.168.228.0/24:/24(254 可用地址)足够单容器;228 段冷门,远离常见
#     192.168.0/1 办公/家庭段,进一步降冲突概率。
# owner 上服务器前必须先 `ip route` + `docker network ls` 对照本网段无冲突(见 runbook §0 表 0.8 行 + §9)。
networks:
  default:
    name: mivo-pg-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: "192.168.228.0/24"
