# gitleaks configuration for MivoCanvas.
# See https://gitleaks.io/ for config syntax.
#
# [extend] useDefault=true: 叠加 gitleaks 默认规则(sk-/ghp_/AKIA 等真实 key 形态)。
# 否则只本 config 的 rules(默认空=啥都不扫,虚假绿)。本 allowlist 只豁免下列
# 占位/fixture 字符串,真实 key 形态绝不豁免。每条 regex 限 literal 占位,非 key 形态。

[extend]
useDefault = true

[allowlist]
description = "MivoCanvas false-positive allowlist (placeholders + fixtures)"

# Each regex below is a literal placeholder/fixture string, NOT a real key
# shape. They grant no access and never appear as actual secrets.
regexes = [
  # 1. Contract capture files (server/contracts/__captures__/*.json) use the
  #    literal redaction marker for scrubbed values (e.g. debug-logs captures
  #    use it in the x-mivo-debug-token field and the ?token= query param).
  #    The marker IS the redaction, not a secret.
  '''<redacted>''',
  # 2. contract.test.ts debug-token fixture (deterministic, dev-server-local,
  #    exercises the debug-logs token gate; grants no access).
  '''test-token''',
  # 3. CI phase2 e2e fixture value (MIVO_BFF_TOKEN fixture in ci.yml comments
  #    / future e2e fixture). CI fixture, not a real secret; the real
  #    MIVO_BFF_TOKEN is injected via GitHub secret at run time.
  '''e2e-token''',
  # 4. Test stub keys in server/lib/keys.review-probe.test.ts +
  #    server/routes/keys.test.ts (sk-FAKEKEY-* / mivo_FAKEKEY_*). Unified fixture
  #    marker "FAKEKEY" — obviously fake, grants no access, only exercises key
  #    format validation. NOT a blanket sk-/mivo_ exemption (real key shapes still
  #    scanned); only strings containing the literal FAKEKEY marker are allowed.
  '''FAKEKEY''',
]

# 4. .env.example documents env var names with placeholder values for local
#    dev onboarding. It never contains real secrets (the gitignored .env does).
#    Only this specific file is exempt — .env itself is not in the repo.
paths = [
  '''\.env\.example$''',
]
